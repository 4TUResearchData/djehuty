[pytest]
testpaths = tests
markers =
    smoke: Quick smoke tests to verify basic functionality
    auth: Tests requiring authentication
    admin: Tests for admin panel functionality
    admin_embargo: Tests for embargo, access control, and private links
    admin_license: Tests for admin license-change workflow
    dataset: Tests for dataset operations
    files: Tests for file upload, download, and management
    review: Tests for publication and review workflow
    versioning: Tests for dataset versioning
    collections: Tests for collection management
    profile: Tests for user profile viewing and editing
    dashboard: Tests for depositor dashboard
    search: Tests for search, filters, categories, and institutions
    git: Tests for git software deposit workflow
    citation: Tests for citation dialog and metadata export
    ror: Tests for ROR publisher link on dataset pages
