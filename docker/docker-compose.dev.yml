services:
  virtuoso:
    image: openlink/virtuoso-opensource-7:7.2.13
    volumes:
      - virtuoso-data:/database
      - ./sparql-init/001-setup_permissions.sql:/opt/virtuoso-opensource/initdb.d/001-setup_permissions.sql:ro
    ports:
      - "8890:8890"
      - "1111:1111"
    environment:
      DBA_PASSWORD: "dba"
      # Relax SPARQL planner limits for dev work against prod-sized restored
      # data. Applied to virtuoso.ini on first boot of a fresh volume; preserved
      # across `just db_backup=… dev` since the restore step keeps virtuoso.ini.
      VIRT_SPARQL_MaxQueryCostEstimationTime: "0"
      VIRT_SPARQL_MaxQueryExecutionTime: "600"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8890"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  djehuty:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8080:8080"
    # Forwarded from `just db_backup=... dev` so the container loads the
    # gitignored *.local.json override instead of the tracked dev config.
    # The image's default CMD runs `djehuty web --initialize` against this.
    environment:
      DJEHUTY_CONFIG: ${DJEHUTY_CONFIG:-/config/djehuty/djehuty-dev-config.json}
    volumes:
      - ../src:/app/src
      - ../etc:/config:ro
      - djehuty-data:/data
    depends_on:
      virtuoso:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

volumes:
  virtuoso-data:
  djehuty-data:
