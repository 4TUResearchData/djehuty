services:
  virtuoso:
    image: openlink/virtuoso-opensource-7:7.2.13
    volumes:
      - virtuoso-data:/database
      - ./sparql-init/001-setup_permissions.sql:/opt/virtuoso-opensource/initdb.d/001-setup_permissions.sql:ro
    ports:
      - "8890:8890"
    environment:
      DBA_PASSWORD: "dba"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8890"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  djehuty:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8080:8080"
    # Forwarded from `just db_backup=... dev` so the container loads the
    # gitignored *.local.xml override instead of the tracked dev config.
    environment:
      DJEHUTY_CONFIG: ${DJEHUTY_CONFIG:-/config/djehuty/djehuty-dev-config.xml}
    volumes:
      - ../src:/app/src
      - ../etc:/config:ro
      - djehuty-data:/data
    depends_on:
      virtuoso:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

volumes:
  virtuoso-data:
  djehuty-data:
