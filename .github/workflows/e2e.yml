name: E2E tests

on:
  workflow_call:
    inputs:
      marker:
        required: true
        type: string
      artifact-suffix:
        required: false
        type: string
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4

      - name: Run E2E tests (${{ inputs.marker }})
        run: just test -m "${{ inputs.marker }}"

      - name: Stop djehuty and flush coverage
        if: always()
        run: |
          # SIGTERM lets coverage.py write parallel-mode .coverage.* files.
          docker compose \
              -f docker/docker-compose.dev.yml \
              -f docker/docker-compose.e2e.yml \
              stop --timeout 30 djehuty || true
          mkdir -p /tmp/coverage-data
          if compgen -G "docker/coverage/.coverage*" > /dev/null; then
              cp --verbose docker/coverage/.coverage* /tmp/coverage-data/
          fi

      - name: Tear down stack
        if: always()
        run: |
          docker compose \
              -f docker/docker-compose.dev.yml \
              -f docker/docker-compose.e2e.yml \
              down -v || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-results-${{ inputs.marker }}${{ inputs.artifact-suffix }}
          path: docker/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage-data-${{ inputs.marker }}${{ inputs.artifact-suffix }}
          path: /tmp/coverage-data/
          retention-days: 1
          if-no-files-found: ignore
          include-hidden-files: true
