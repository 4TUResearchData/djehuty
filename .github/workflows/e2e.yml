name: E2E tests

on:
  workflow_call:
    inputs:
      marker:
        required: true
        type: string
      artifact-suffix:
        required: false
        type: string
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      sparql:
        image: openlink/virtuoso-opensource-7:7.2.13
        ports:
          - 8890:8890
          - 1111:1111
        env:
          DBA_PASSWORD: dba
          VIRT_Parameters_DirsAllowed: "., ../vsp, /usr/share/proj, /initdb.d"
        options: --health-cmd="isql 127.0.0.1:1111 dba dba exec='select 1'" --health-interval=10s --health-timeout=5s --health-retries=10 --health-start-period=30s

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxmlsec1-dev pkg-config libxml2-dev libxslt1-dev libxmlsec1-openssl

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Create pyproject.toml and install package
        run: |
          sed 's/@VERSION@/0.0.0+ci/' pyproject.toml.in > pyproject.toml
          pip install -e .

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Initialize SPARQL database
        run: |
          docker cp docker/dev/sparql-init/001-setup_permissions.sql ${{ job.services.sparql.id }}:/tmp/001-setup_permissions.sql
          docker exec ${{ job.services.sparql.id }} isql 1111 dba dba /tmp/001-setup_permissions.sql

      - name: Start application
        run: |
          coverage run -m djehuty.ui web --initialize --config-file .github/ci-djehuty.xml &
          echo $! > /tmp/djehuty.pid
          # Wait for the application to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Application is ready"
              break
            fi
            echo "Waiting for application to start... ($i/30)"
            sleep 2
          done
          # Final check
          curl -sf http://localhost:8080/ > /dev/null || (echo "Application failed to start" && exit 1)

      - name: Seed test data
        run: |
          docker cp docker/dev/sparql-init/002-seed-test-data.sql ${{ job.services.sparql.id }}:/tmp/002-seed-test-data.sql
          docker exec ${{ job.services.sparql.id }} isql 1111 dba dba /tmp/002-seed-test-data.sql

      - name: Run E2E tests (${{ inputs.marker }})
        working-directory: tests/e2e
        env:
          E2E_BASE_URL: http://localhost:8080
          E2E_SPARQL_URL: http://localhost:8890/sparql
        run: |
          python -m pytest tests/ -v --tb=short \
            -m "${{ inputs.marker }}" \
            --reruns=1 --reruns-delay=5 \
            --screenshot=only-on-failure \
            --output=test-results

      - name: Stop application and collect coverage
        if: always()
        run: |
          PID=$(cat /tmp/djehuty.pid || echo "")
          if [ -n "$PID" ] && kill -0 "$PID"; then
            kill -TERM "$PID"
            for i in $(seq 1 15); do
              if ! kill -0 "$PID"; then break; fi
              sleep 1
            done
            kill -0 "$PID" && kill -9 "$PID" || true
          fi
          ls -la .coverage*
          mkdir -p /tmp/coverage-data
          cp --verbose .coverage* /tmp/coverage-data/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-results-${{ inputs.marker }}${{ inputs.artifact-suffix }}
          path: tests/e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage-data-${{ inputs.marker }}${{ inputs.artifact-suffix }}
          path: /tmp/coverage-data/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true
