name: Coverage report

on:
  workflow_call:

jobs:
  report:
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.10

      - name: Install coverage
        run: uv sync --frozen --only-group dev

      - name: Download coverage data
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine and report coverage
        run: |
          ls -la .coverage* 2>/dev/null || { echo "No coverage files found"; exit 0; }
          uv run coverage combine
          uv run coverage report | tee coverage-report.txt
          echo '## Coverage Report' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat coverage-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          uv run coverage html

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('coverage-report.txt')) {
              console.log('No coverage report found, skipping comment');
              return;
            }

            const report = fs.readFileSync('coverage-report.txt', 'utf8');
            const body = `## 📊 Coverage Report\n\n\`\`\`\n${report}\n\`\`\`\n\n<sub>Generated by CI from commit ${{ github.sha }}</sub>`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('📊 Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage-html-report
          path: coverage-html/
          retention-days: 30
          if-no-files-found: ignore
