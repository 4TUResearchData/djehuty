name: Coverage report

on:
  workflow_call:

jobs:
  report:
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install coverage
        run: pip install "coverage[toml]>=7.0"

      - name: Create pyproject.toml
        run: sed 's/@VERSION@/0.0.0+ci/' pyproject.toml.in > pyproject.toml

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine and report coverage
        run: |
          ls -la .coverage* 2>/dev/null || { echo "No coverage files found"; exit 0; }
          coverage combine
          coverage report | tee coverage-report.txt
          echo '## Coverage Report' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat coverage-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          coverage html

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('coverage-report.txt')) {
              console.log('No coverage report found, skipping comment');
              return;
            }

            const report = fs.readFileSync('coverage-report.txt', 'utf8');
            const body = `## 📊 Coverage Report\n\n\`\`\`\n${report}\n\`\`\`\n\n<sub>Generated by CI from commit ${{ github.sha }}</sub>`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('📊 Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: coverage-html/
          retention-days: 30
          if-no-files-found: ignore
