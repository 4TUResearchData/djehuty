name: Test Build

on:
  workflow_call:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Generate requirements.lock
        run: uv export --frozen --no-dev --no-hashes -o docker/requirements.lock

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: djehuty:test
          build-args: |
            PURPOSE=release
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start dev environment (just dev)
        run: |
          just dev &
          JUST_PID=$!
          echo "just_pid=$JUST_PID" >> "$GITHUB_ENV"

      - name: Wait for djehuty to be ready
        run: |
          echo "Polling http://127.0.0.1:8080/ until djehuty responds..."
          DEADLINE=$(( $(date +%s) + 300 ))
          until curl -fsS -o /dev/null --max-time 5 http://127.0.0.1:8080/; do
            if (( $(date +%s) >= DEADLINE )); then
              echo "ERROR: djehuty did not become ready within 5 minutes"
              docker compose -f docker/docker-compose.dev.yml ps
              docker compose -f docker/docker-compose.dev.yml logs --tail=200
              exit 1
            fi
            sleep 5
          done
          echo "djehuty is up on http://127.0.0.1:8080/"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.dev.yml logs --tail=500

      - name: Tear down dev environment
        if: always()
        run: |
          if [ -n "${just_pid:-}" ]; then
            kill "$just_pid" 2>/dev/null || true
          fi
          just clean

  pypi-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Build sdist and wheel
        run: just build
