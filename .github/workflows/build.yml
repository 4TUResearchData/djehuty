name: Build

on:
  workflow_call:
    inputs:
      push_image:
        description: "Push the Docker image to the container registry."
        type: boolean
        default: false
      upload_python_artifacts:
        description: "Upload the sdist and wheel as workflow artifacts."
        type: boolean
        default: false
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  pypi-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Build sdist and wheel
        run: just build

      - name: Upload Python distribution artifacts
        if: inputs.upload_python_artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-dist
          path: build/
          if-no-files-found: error

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        if: inputs.push_image
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v5.8.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=match,pattern=\d+\.\d+,enable=${{ inputs.push_image && startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ inputs.push_image && startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=dev,enable=${{ inputs.push_image && github.ref == 'refs/heads/main' }}
            type=sha,enable=${{ inputs.push_image && github.ref == 'refs/heads/main' }}
            type=raw,value=test,enable=${{ !inputs.push_image }}

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ inputs.push_image }}
          load: ${{ !inputs.push_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start dev environment (just dev)
        run: |
          just dev &
          JUST_PID=$!
          echo "just_pid=$JUST_PID" >> "$GITHUB_ENV"

      - name: Wait for djehuty to be ready
        run: |
          echo "Polling http://127.0.0.1:8080/ until djehuty responds..."
          DEADLINE=$(( $(date +%s) + 300 ))
          until curl -fsS -o /dev/null --max-time 5 http://127.0.0.1:8080/; do
            if (( $(date +%s) >= DEADLINE )); then
              echo "ERROR: djehuty did not become ready within 5 minutes"
              docker compose -f docker/docker-compose.dev.yml ps
              docker compose -f docker/docker-compose.dev.yml logs --tail=200
              exit 1
            fi
            sleep 5
          done
          echo "djehuty is up on http://127.0.0.1:8080/"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.dev.yml logs --tail=500

      - name: Tear down dev environment
        if: always()
        run: |
          if [ -n "${just_pid:-}" ]; then
            kill "$just_pid" 2>/dev/null || true
          fi
          just clean
