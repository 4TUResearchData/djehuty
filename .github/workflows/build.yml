name: Test Build

on:
  workflow_call:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Generate requirements.lock
        run: uv export --frozen --no-dev --no-hashes -o docker/requirements.lock

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: djehuty:test
          build-args: |
            PURPOSE=release
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start dev environment (just dev)
        run: |
          just dev &
          JUST_PID=$!
          echo "just_pid=$JUST_PID" >> "$GITHUB_ENV"

      - name: Wait for djehuty to be ready
        run: |
          echo "Polling http://127.0.0.1:8080/ until djehuty responds..."
          DEADLINE=$(( $(date +%s) + 300 ))
          until curl -fsS -o /dev/null --max-time 5 http://127.0.0.1:8080/; do
            if (( $(date +%s) >= DEADLINE )); then
              echo "ERROR: djehuty did not become ready within 5 minutes"
              docker compose -f docker/docker-compose.dev.yml ps
              docker compose -f docker/docker-compose.dev.yml logs --tail=200
              exit 1
            fi
            sleep 5
          done
          echo "djehuty is up on http://127.0.0.1:8080/"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.dev.yml logs --tail=500

      - name: Tear down dev environment
        if: always()
        run: |
          if [ -n "${just_pid:-}" ]; then
            kill "$just_pid" 2>/dev/null || true
          fi
          just clean

  pypi-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Build sdist and wheel
        run: just build
