name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml

  unit:
    uses: ./.github/workflows/unit.yml

  e2e:
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        marker:
          - smoke
          - auth
          - admin
          - dataset
          - files
          - embargo
          - review
          - versioning
          - collections
          - profile
          - dashboard
          - search
          - git
          - citation
          - api
    uses: ./.github/workflows/e2e.yml
    with:
      marker: ${{ matrix.marker }}

  coverage-report:
    needs: [unit, e2e]
    uses: ./.github/workflows/coverage.yml
    secrets: inherit

  publish-dev:
    needs: [build, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/build.yml
    with:
      push_image: true
    permissions:
      contents: read
      packages: write
